<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 800px;
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .15);
        }

        h1 {
            color: #222;
            text-align: center;
            margin-bottom: 30px;
        }

        .layout {
            display: flex;
            gap: 30px;
        }

        .esquerda {
            width: 35%;
        }

        .direita {
            width: 65%;
        }

        .esquerda h2,
        .direita h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .opcao {
            margin: 18px 0;
            color: #222;
            font-size: 18px;
        }

        input[type="checkbox"] {
            transform: scale(1.2);
            margin-right: 8px;
        }

        input[type="number"] {
            width: 70px;
            padding: 6px;
            font-size: 17px;
            border-radius: 8px;
        }

        .senha-box {
            display: flex;
            align-items: center;
            border: 2px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
        }

        .senha {
            flex: 1;
            border: none;
            height: 45px;
            padding: 0 15px;
            font-size: 20px;
            outline: none;
        }

        .copiar {
            position: relative;
            bottom: 15px;
            right: 10px;
            width: 55px;
            height: 40px;
            border: none;
            background: #ececec;
            cursor: pointer;
            font-size: 25px;

        }

        .copiar:hover {
            background: #dcdcdc;
        }

        button {
            width: 100%;
            height: 50px;
            margin-top: 30px;
            border: none;
            border-radius: 10px;
            background: dodgerblue;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #0077ff;
        }

        .forca {
            margin-top: 20px;
            color: #333;
            font-size: 18px;
        }

        .texto {
            position: absolute;
            top: -5px;
            left: 35px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 30px;
            font-weight: bold;

        }

        .texto2 {
            position: absolute;
            bottom: 200px;

        }
    </style>
</head>

<body>

    <p class="texto">Gerador de Senhas 🔐</p>

    <p class="texto2">Esse site não guarda as suas senhas,
        então não se preocupe</p>

    <div class="container">

        <h1>🔐 Gerador de Senhas</h1>

        <div class="layout">

            <div class="esquerda">

                <h2>Configurações</h2>

                <label>
                    Tamanho:
                    <input type="number" id="tamanho" value="12" min="4" max="64">
                </label>

                <div class="opcao">
                    <input type="checkbox" id="maiusculas">
                    <label for="maiusculas">Maiúsculas</label>
                </div>

                <div class="opcao">
                    <input type="checkbox" id="minusculas">
                    <label for="minusculas">Minúsculas</label>
                </div>

                <div class="opcao">
                    <input type="checkbox" id="numeros">
                    <label for="numeros">Números</label>
                </div>

                <div class="opcao">
                    <input type="checkbox" id="simbolos">
                    <label for="simbolos">Símbolos</label>
                </div>

            </div>

            <div class="direita">

                <h2>Senha Gerada</h2>

                <div class="senha-box">

                    <input type="text" class="senha" id="senha" readonly placeholder="Clique em Gerar Senha">

                    <button class="copiar" onclick="copiarSenha()">
                        📋
                    </button>

                </div>



                <button onclick="gerarSenha()">
                    🔄 Gerar Senha
                </button>

            </div>

        </div>

    </div>

    <script>

        function copiarSenha() {

            let senha = document.getElementById("senha").value;

            if (senha === "") {
                alert("Nenhuma senha foi gerada!");
                return;
            }

            navigator.clipboard.writeText(senha);

            alert("Senha copiada!");
        }

        function gerarSenha() {

            let caracteres = "";

            if (document.getElementById("maiusculas").checked)
                caracteres += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

            if (document.getElementById("minusculas").checked)
                caracteres += "abcdefghijklmnopqrstuvwxyz";

            if (document.getElementById("numeros").checked)
                caracteres += "0123456789";

            if (document.getElementById("simbolos").checked)
                caracteres += "!@#$%&*()-_=+?/";

            if (caracteres === "") {
                alert("Selecione pelo menos uma opção!");
                return;
            }

            let tamanho = Number(document.getElementById("tamanho").value);

            let senha = "";

            for (let i = 0; i < tamanho; i++) {

                let aleatorio = Math.floor(Math.random() * caracteres.length);

                senha += caracteres[aleatorio];

            }

            document.getElementById("senha").value = senha;

        }

    </script>

</body>

</html>
